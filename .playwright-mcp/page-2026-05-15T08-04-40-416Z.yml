            - generic [ref=e221]: How long does a typical network deployment take?
            - img [ref=e223]
          - paragraph [ref=e224]: Project timelines vary based on scope. A small office network can be completed in 3-5 days, while large enterprise deployments across multiple locations may take 4-8 weeks. We provide detailed timelines during the planning phase.
        - generic [ref=e225]:
