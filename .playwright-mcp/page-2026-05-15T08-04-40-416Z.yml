            - img [ref=e229]
          - paragraph [ref=e230]: Yes. All our structured cabling installations come with a 25-year system warranty backed by manufacturers like CommScope and Panduit. Network equipment carries standard manufacturer warranties, and we offer extended maintenance packages.
        - generic [ref=e231]:
